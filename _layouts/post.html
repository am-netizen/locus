---
layout: default
---

<div class="post-header">
  {% if page.tags[0] %}
  <span class="post-header-tag">{{ page.tags[0] }}</span>
  {% endif %}
  <h1>{{ page.title }}</h1>
  <div class="post-header-meta">{{ page.date | date: "%B %d, %Y" }}</div>
</div>

<div class="post-content">
  {{ content }}
</div>
