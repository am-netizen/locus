<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% if page.title %}{{ page.title }} — {% endif %}A.M.</title>
  <meta name="description" content="{% if page.excerpt %}{{ page.excerpt | strip_html | strip_newlines | truncate: 160 }}{% else %}{{ site.description }}{% endif %}" />
  <script>
    (function() {
      var savedTheme = localStorage.getItem("theme");
      var prefersDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
      var theme = savedTheme || (prefersDark ? "dark" : "dark");
      document.documentElement.setAttribute("data-theme", theme);
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0b1220;
      --surface: #121a2b;
      --surface-2: #0f1728;
      --text: #e6edf6;
      --muted: #c4d0df;
      --soft: #95a8bf;
      --brand: #44d4c3;
      --brand-soft: #123243;
      --border: #28364d;
      --code-bg: #0d1526;
      --card-hover: #16233a;
      --focus: #38bdf8;
      --shadow: 0 12px 32px rgba(2, 6, 23, 0.42);
      --sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --mono: 'IBM Plex Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
    }
    :root[data-theme="light"] {
      --bg: #f5f7fb;
      --surface: #ffffff;
      --surface-2: #f8fafc;
      --text: #0f172a;
      --muted: #334155;
      --soft: #64748b;
      --brand: #0f766e;
      --brand-soft: #ccfbf1;
      --border: #dbe4ee;
      --code-bg: #f1f5f9;
      --card-hover: #f1f5f9;
      --focus: #0284c7;
      --shadow: 0 10px 24px rgba(15, 23, 42, 0.08);
    }
    * { box-sizing: border-box; }
    *::before, *::after { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      font-size: clamp(16px, 1rem + 0.2vw, 18px);
      line-height: 1.7;
      -webkit-font-smoothing: antialiased;
      margin: 0;
    }
    .skip-link {
      position: absolute;
      left: -999px;
      top: 0;
      z-index: 1000;
      background: var(--text);
      color: var(--surface);
      padding: 0.75rem 1rem;
      border-radius: 0.5rem;
      text-decoration: none;
      font-size: 0.92rem;
    }
    .skip-link:focus {
      left: 1rem;
      top: 1rem;
    }
    .wrap {
      width: min(960px, calc(100% - 1.5rem));
      margin: 1rem auto;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 0.9rem;
      box-shadow: var(--shadow);
      overflow: clip;
    }
    header {
      padding: 1rem 1.35rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
      gap: 0.75rem;
    }
    .logo {
      font-family: var(--mono);
      font-size: 0.8rem;
      letter-spacing: 0.08em;
      font-weight: 500;
      color: var(--text);
      text-decoration: none;
    }
    .logo span { color: var(--brand); }
    nav {
      display: flex;
      align-items: center;
      gap: 0.2rem;
      flex-wrap: wrap;
    }
    nav a {
      font-family: var(--mono);
      font-size: 0.76rem;
      font-weight: 500;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--soft);
      text-decoration: none;
      margin-left: 0.2rem;
      padding: 0.45rem 0.62rem;
      border-radius: 0.4rem;
      transition: color 0.2s, background 0.2s;
    }
    .theme-toggle {
      font-family: var(--mono);
      font-size: 0.74rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--soft);
      border-radius: 999px;
      padding: 0.42rem 0.68rem;
      cursor: pointer;
      margin-left: 0.3rem;
    }
    .theme-toggle:hover {
      color: var(--text);
      background: var(--code-bg);
    }
    nav a:hover {
      color: var(--text);
      background: var(--code-bg);
    }
    .content {
      padding: 1.6rem 1.35rem 2rem;
    }
    footer {
      padding: 1rem 1.35rem;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      gap: 0.5rem;
    }
    footer span {
      font-family: var(--mono);
      font-size: 0.72rem;
      color: var(--soft);
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .home-intro {
      margin-bottom: 1.6rem;
      padding: 0 0 1.5rem;
      border-bottom: 1px solid var(--border);
    }
    .home-intro p {
      margin: 0;
      max-width: 68ch;
      font-size: clamp(1.02rem, 0.95rem + 0.25vw, 1.16rem);
      line-height: 1.8;
      color: var(--muted);
    }
    .section-label {
      margin: 0 0 1.2rem;
      font-family: var(--mono);
      font-size: 0.76rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--soft);
    }
    .post-content {
      max-width: 72ch;
      margin: 0 auto;
    }
    .post-content h1, .post-content h2, .post-content h3 {
      line-height: 1.3;
      margin: 1.8rem 0 0.7rem;
      color: var(--text);
    }
    .post-content h1 { font-size: clamp(1.6rem, 1.35rem + 1.2vw, 2rem); }
    .post-content h2 { font-size: clamp(1.25rem, 1.1rem + 0.6vw, 1.5rem); }
    .post-content h3 { font-size: 1.1rem; }
    .post-content p { margin-bottom: 1rem; color: var(--muted); }
    .post-content a {
      color: var(--brand);
      text-decoration: underline;
      text-decoration-thickness: 0.08em;
      text-underline-offset: 0.14em;
    }
    .post-content a:hover { color: var(--text); }
    .post-content code {
      font-family: var(--mono);
      font-size: 0.86rem;
      background: var(--code-bg);
      padding: 0.15rem 0.35rem;
      border-radius: 0.35rem;
      color: var(--text);
    }
    .post-content pre {
      background: var(--code-bg);
      border: 1px solid var(--border);
      padding: 0.95rem;
      overflow-x: auto;
      margin: 1.2rem 0;
      border-radius: 0.65rem;
    }
    .post-content pre code { background: none; padding: 0; color: var(--text); }
    .post-content blockquote {
      border-left: 4px solid var(--brand);
      padding: 0.2rem 0 0.2rem 0.9rem;
      color: var(--muted);
      margin: 1.2rem 0;
      background: var(--brand-soft);
    }
    .post-content ul, .post-content ol {
      padding-left: 1.2rem;
      margin-bottom: 1rem;
      color: var(--muted);
    }
    .post-content li { margin-bottom: 0.4rem; }
    .post-content table {
      width: 100%;
      border-collapse: collapse;
      margin: 1.4rem 0;
      font-size: 0.94rem;
      display: block;
      overflow-x: auto;
    }
    .post-content th, .post-content td {
      border: 1px solid var(--border);
      text-align: left;
      vertical-align: top;
      padding: 0.55rem 0.65rem;
    }
    .post-content th {
      background: var(--code-bg);
      color: var(--text);
      font-weight: 600;
    }
    .post-row {
      display: flex;
      flex-direction: column;
      gap: 0.55rem;
      padding: 1rem 1.05rem;
      border: 1px solid var(--border);
      text-decoration: none;
      color: inherit;
      border-radius: 0.72rem;
      transition: transform 0.16s ease, background 0.16s ease, border-color 0.16s ease;
      margin-bottom: 0.8rem;
    }
    .post-row:hover {
      transform: translateY(-1px);
      background: var(--card-hover);
      border-color: var(--brand);
    }
    .post-top {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: start;
      gap: 0.8rem;
    }
    .post-title {
      font-size: clamp(1.03rem, 1rem + 0.2vw, 1.18rem);
      font-weight: 600;
      color: var(--text);
      line-height: 1.35;
      margin: 0;
      overflow-wrap: anywhere;
    }
    .post-row:hover .post-title { color: var(--brand); }
    .post-date {
      font-family: var(--mono);
      font-size: 0.74rem;
      color: var(--soft);
      white-space: normal;
      flex-shrink: 0;
      text-align: right;
      max-width: 12ch;
    }
    .post-excerpt {
      font-size: 0.98rem;
      color: var(--muted);
      line-height: 1.6;
      overflow-wrap: anywhere;
    }
    .post-tag {
      font-family: var(--mono);
      font-size: 0.73rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--brand);
    }
    .post-header {
      padding: 0 0 1.1rem;
      border-bottom: 1px solid var(--border);
      margin-bottom: 1.2rem;
    }
    .post-header-tag {
      font-family: var(--mono);
      font-size: 0.74rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--brand);
      margin-bottom: 0.55rem;
      display: inline-block;
      background: var(--brand-soft);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 0.2rem 0.52rem;
    }
    .post-header h1 {
      font-size: clamp(1.55rem, 1.3rem + 1.2vw, 2.2rem);
      font-weight: 700;
      line-height: 1.2;
      color: var(--text);
      margin: 0 0 0.65rem;
    }
    .post-header-meta {
      font-family: var(--mono);
      font-size: 0.74rem;
      color: var(--soft);
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    :focus-visible {
      outline: 3px solid var(--focus);
      outline-offset: 2px;
      border-radius: 0.25rem;
    }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        transition: none !important;
        animation: none !important;
        scroll-behavior: auto !important;
      }
    }
    @media (max-width: 760px) {
      .wrap {
        width: min(100%, calc(100% - 0.5rem));
        margin: 0.25rem auto;
        border-radius: 0.6rem;
      }
      header {
        padding: 0.85rem 0.85rem 0.8rem;
        flex-direction: column;
        align-items: flex-start;
      }
      nav a {
        margin-left: 0;
        margin-right: 0.08rem;
      }
      .theme-toggle {
        margin-left: 0.08rem;
      }
      .content {
        padding: 1.15rem 0.85rem 1.3rem;
      }
      .home-intro p {
        font-size: 1rem;
      }
      .post-top {
        grid-template-columns: 1fr;
        gap: 0.25rem;
      }
      .post-date {
        max-width: none;
        text-align: left;
      }
      footer {
        padding: 0.85rem;
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <a class="skip-link" href="#main-content">Skip to content</a>
  <div class="wrap">
    <header>
      <a href="{{ "/" | relative_url }}" class="logo">A<span>.</span>M<span>.</span></a>
      <nav>
        <a href="{{ "/" | relative_url }}">Writing</a>
        <a href="{{ "/about" | relative_url }}">About</a>
        <button type="button" class="theme-toggle" id="theme-toggle" aria-label="Toggle color theme">Light</button>
      </nav>
    </header>
    <main class="content" id="main-content">
      {{ content }}
    </main>
    <footer>
      <span>A.M.</span>
      <span>© {{ site.time | date: "%Y" }}</span>
    </footer>
  </div>
  <script>
    (function() {
      var root = document.documentElement;
      var button = document.getElementById("theme-toggle");
      if (!button) return;
      var current = root.getAttribute("data-theme") || "dark";
      button.textContent = current === "dark" ? "Light" : "Dark";
      button.setAttribute("aria-pressed", current === "dark" ? "false" : "true");
      button.addEventListener("click", function() {
        var active = root.getAttribute("data-theme") || "dark";
        var next = active === "dark" ? "light" : "dark";
        root.setAttribute("data-theme", next);
        localStorage.setItem("theme", next);
        button.textContent = next === "dark" ? "Light" : "Dark";
        button.setAttribute("aria-pressed", next === "dark" ? "false" : "true");
      });
    })();
  </script>
</body>
</html>
