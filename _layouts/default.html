<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% if page.title %}{{ page.title }} — {% endif %}A.M.</title>
  <meta name="description" content="{% if page.excerpt %}{{ page.excerpt | strip_html | strip_newlines | truncate: 160 }}{% else %}{{ site.description }}{% endif %}" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #f8fafc;
      --surface: #ffffff;
      --text: #0f172a;
      --muted: #475569;
      --soft: #64748b;
      --brand: #0f766e;
      --brand-soft: #ccfbf1;
      --border: #dbe4ee;
      --code-bg: #f1f5f9;
      --shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
      --sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --mono: 'IBM Plex Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
    }
    * { box-sizing: border-box; }
    *::before, *::after { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      font-size: 18px;
      line-height: 1.75;
      -webkit-font-smoothing: antialiased;
      margin: 0;
    }
    .skip-link {
      position: absolute;
      left: -999px;
      top: 0;
      z-index: 1000;
      background: var(--text);
      color: var(--surface);
      padding: 0.75rem 1rem;
      border-radius: 0.5rem;
      text-decoration: none;
      font-size: 0.92rem;
    }
    .skip-link:focus {
      left: 1rem;
      top: 1rem;
    }
    .wrap {
      width: min(900px, calc(100% - 2rem));
      margin: 1.5rem auto;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 1rem;
      box-shadow: var(--shadow);
      overflow: clip;
    }
    header {
      padding: 1.4rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
      gap: 1rem;
    }
    .logo {
      font-family: var(--mono);
      font-size: 0.84rem;
      letter-spacing: 0.1em;
      font-weight: 500;
      color: var(--text);
      text-decoration: none;
    }
    .logo span { color: var(--brand); }
    nav a {
      font-family: var(--mono);
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--soft);
      text-decoration: none;
      margin-left: 1.2rem;
      padding: 0.4rem 0.55rem;
      border-radius: 0.4rem;
      transition: color 0.2s;
    }
    nav a:hover {
      color: var(--text);
      background: var(--code-bg);
    }
    .content {
      padding: 2.2rem 2rem 2.6rem;
    }
    footer {
      padding: 1.2rem 2rem 1.5rem;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      gap: 0.5rem;
    }
    footer span {
      font-family: var(--mono);
      font-size: 0.68rem;
      color: var(--soft);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    .home-intro {
      margin-bottom: 2rem;
      padding: 0 0 2rem;
      border-bottom: 1px solid var(--border);
    }
    .home-intro p {
      margin: 0;
      max-width: 66ch;
      font-size: 1.12rem;
      line-height: 1.85;
      color: var(--muted);
    }
    .section-label {
      margin: 0 0 1.2rem;
      font-family: var(--mono);
      font-size: 0.74rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--soft);
    }
    .post-content h1, .post-content h2, .post-content h3 {
      line-height: 1.28;
      margin: 2rem 0 0.8rem;
      color: var(--text);
    }
    .post-content h1 { font-size: clamp(1.65rem, 4vw, 2.15rem); }
    .post-content h2 { font-size: clamp(1.28rem, 3vw, 1.58rem); }
    .post-content h3 { font-size: 1.1rem; }
    .post-content p { margin-bottom: 1rem; color: var(--muted); }
    .post-content a {
      color: var(--brand);
      text-decoration: underline;
      text-decoration-thickness: 0.08em;
      text-underline-offset: 0.14em;
    }
    .post-content a:hover { color: #0b5f59; }
    .post-content code {
      font-family: var(--mono);
      font-size: 0.84rem;
      background: var(--code-bg);
      padding: 0.15rem 0.32rem;
      border-radius: 0.35rem;
      color: #0f172a;
    }
    .post-content pre {
      background: #0f172a;
      border: 1px solid var(--border);
      padding: 1rem;
      overflow-x: auto;
      margin: 1.2rem 0;
      border-radius: 0.65rem;
    }
    .post-content pre code { background: none; padding: 0; color: #e2e8f0; }
    .post-content blockquote {
      border-left: 4px solid var(--brand);
      padding: 0.1rem 0 0.1rem 1rem;
      color: var(--muted);
      margin: 1.2rem 0;
      background: #f8fffe;
    }
    .post-content ul, .post-content ol {
      padding-left: 1.2rem;
      margin-bottom: 1rem;
      color: var(--muted);
    }
    .post-content li { margin-bottom: 0.4rem; }
    .post-content table {
      width: 100%;
      border-collapse: collapse;
      margin: 1.4rem 0;
      font-size: 0.95rem;
    }
    .post-content th, .post-content td {
      border: 1px solid var(--border);
      text-align: left;
      vertical-align: top;
      padding: 0.55rem 0.65rem;
    }
    .post-content th {
      background: var(--code-bg);
      color: var(--text);
      font-weight: 600;
    }
    .post-row {
      display: flex;
      flex-direction: column;
      gap: 0.52rem;
      padding: 1.2rem;
      border-bottom: 1px solid var(--border);
      text-decoration: none;
      color: inherit;
      border-radius: 0.7rem;
      transition: transform 0.16s ease, background 0.16s ease, border-color 0.16s ease;
    }
    .post-row:first-of-type { border-top: 1px solid var(--border); }
    .post-row:hover {
      transform: translateY(-1px);
      background: #f8fbff;
      border-color: #cbd8e6;
    }
    .post-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 0.8rem;
    }
    .post-title {
      font-size: 1.12rem;
      font-weight: 600;
      color: var(--text);
      line-height: 1.4;
      margin: 0;
    }
    .post-row:hover .post-title { color: #0b5f59; }
    .post-date {
      font-family: var(--mono);
      font-size: 0.7rem;
      color: var(--soft);
      white-space: nowrap;
      flex-shrink: 0;
    }
    .post-excerpt {
      font-size: 0.97rem;
      color: var(--muted);
      line-height: 1.68;
    }
    .post-tag {
      font-family: var(--mono);
      font-size: 0.67rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #0b5f59;
    }
    .post-header {
      padding: 0 0 1.4rem;
      border-bottom: 1px solid var(--border);
      margin-bottom: 1.6rem;
    }
    .post-header-tag {
      font-family: var(--mono);
      font-size: 0.72rem;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: #0b5f59;
      margin-bottom: 0.65rem;
      display: inline-block;
      background: var(--brand-soft);
      border: 1px solid #99f6e4;
      border-radius: 999px;
      padding: 0.2rem 0.55rem;
    }
    .post-header h1 {
      font-size: clamp(1.7rem, 4vw, 2.35rem);
      font-weight: 700;
      line-height: 1.25;
      color: var(--text);
      margin: 0 0 0.85rem;
    }
    .post-header-meta {
      font-family: var(--mono);
      font-size: 0.72rem;
      color: var(--soft);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    :focus-visible {
      outline: 3px solid #0ea5e9;
      outline-offset: 2px;
      border-radius: 0.25rem;
    }
    @media (max-width: 760px) {
      .wrap {
        width: min(100%, calc(100% - 0.75rem));
        margin: 0.35rem auto;
        border-radius: 0.8rem;
      }
      header {
        padding: 1rem 1rem 0.9rem;
        flex-direction: column;
        align-items: flex-start;
      }
      nav {
        margin-left: -0.45rem;
      }
      nav a {
        margin-left: 0;
        margin-right: 0.12rem;
      }
      .content {
        padding: 1.3rem 1rem 1.6rem;
      }
      .home-intro p {
        font-size: 1.04rem;
      }
      .post-top {
        flex-direction: column;
        gap: 0.3rem;
      }
      .post-date {
        white-space: normal;
      }
      footer {
        padding: 1rem;
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <a class="skip-link" href="#main-content">Skip to content</a>
  <div class="wrap">
    <header>
      <a href="{{ "/" | relative_url }}" class="logo">A<span>.</span>M<span>.</span></a>
      <nav>
        <a href="{{ "/" | relative_url }}">Writing</a>
        <a href="{{ "/about" | relative_url }}">About</a>
      </nav>
    </header>
    <main class="content" id="main-content">
      {{ content }}
    </main>
    <footer>
      <span>A.M.</span>
      <span>© {{ site.time | date: "%Y" }}</span>
    </footer>
  </div>
</body>
</html>
