<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% if page.title %}{{ page.title }} — {% endif %}A.M.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #111318;
      --text: #d8d4cc;
      --muted: #6b6860;
      --dim: #2e2e38;
      --gold: #b8944a;
      --border: #1e2028;
      --serif: 'Lora', Georgia, serif;
      --mono: 'DM Mono', monospace;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--serif);
      font-size: 18px;
      line-height: 1.75;
      -webkit-font-smoothing: antialiased;
    }
    .wrap { max-width: 680px; margin: 0 auto; padding: 0 2rem; }
    header {
      padding: 3.5rem 0 3rem;
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
    }
    .logo {
      font-family: var(--mono);
      font-size: 0.8rem;
      letter-spacing: 0.12em;
      color: var(--text);
      text-decoration: none;
    }
    .logo span { color: var(--gold); }
    nav a {
      font-family: var(--mono);
      font-size: 0.65rem;
      font-weight: 300;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
      margin-left: 2rem;
      transition: color 0.2s;
    }
    nav a:hover { color: var(--text); }
    .content { padding: 4rem 0; }
    footer {
      padding: 3rem 0;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
    }
    footer span {
      font-family: var(--mono);
      font-size: 0.58rem;
      font-weight: 300;
      color: var(--dim);
      letter-spacing: 0.1em;
    }
    .post-content h1, .post-content h2, .post-content h3 {
      font-weight: 500;
      margin: 2rem 0 0.75rem;
      color: var(--text);
    }
    .post-content p { margin-bottom: 1.25rem; color: var(--muted); }
    .post-content a { color: var(--gold); text-decoration: none; border-bottom: 1px solid rgba(184,148,74,0.3); }
    .post-content a:hover { border-color: var(--gold); }
    .post-content code {
      font-family: var(--mono);
      font-size: 0.82rem;
      background: var(--border);
      padding: 0.15rem 0.4rem;
      border-radius: 2px;
      color: var(--gold);
    }
    .post-content pre {
      background: #0d0f14;
      border: 1px solid var(--border);
      padding: 1.5rem;
      overflow-x: auto;
      margin: 1.5rem 0;
      border-radius: 2px;
    }
    .post-content pre code { background: none; padding: 0; color: var(--text); }
    .post-content blockquote {
      border-left: 2px solid var(--gold);
      padding-left: 1.5rem;
      font-style: italic;
      color: var(--muted);
      margin: 1.5rem 0;
    }
    .post-content ul, .post-content ol {
      padding-left: 1.5rem;
      margin-bottom: 1.25rem;
      color: var(--muted);
    }
    .post-content li { margin-bottom: 0.4rem; }
    .post-row {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      padding: 1.8rem 0;
      border-bottom: 1px solid var(--border);
      text-decoration: none;
      color: inherit;
      position: relative;
    }
    .post-row::before {
      content: '';
      position: absolute;
      left: -2rem;
      top: 0; bottom: 0;
      width: 2px;
      background: var(--gold);
      transform: scaleY(0);
      transform-origin: top;
      transition: transform 0.35s cubic-bezier(.16,1,.3,1);
    }
    .post-row:hover::before { transform: scaleY(1); }
    .post-row:first-of-type { border-top: 1px solid var(--border); }
    .post-top {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 1rem;
    }
    .post-title {
      font-size: 1.05rem;
      font-weight: 500;
      color: var(--text);
      line-height: 1.4;
      transition: color 0.2s;
    }
    .post-row:hover .post-title { color: var(--gold); }
    .post-date {
      font-family: var(--mono);
      font-size: 0.58rem;
      color: var(--dim);
      white-space: nowrap;
      flex-shrink: 0;
    }
    .post-excerpt {
      font-size: 0.92rem;
      font-style: italic;
      color: var(--muted);
      line-height: 1.7;
    }
    .post-tag {
      font-family: var(--mono);
      font-size: 0.58rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--gold);
      opacity: 0.7;
    }
    .post-header {
      padding: 3rem 0 2rem;
      border-bottom: 1px solid var(--border);
      margin-bottom: 3rem;
    }
    .post-header-tag {
      font-family: var(--mono);
      font-size: 0.6rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 1rem;
      display: block;
    }
    .post-header h1 {
      font-size: clamp(1.6rem, 4vw, 2.4rem);
      font-weight: 500;
      line-height: 1.25;
      color: var(--text);
      margin-bottom: 1rem;
    }
    .post-header-meta {
      font-family: var(--mono);
      font-size: 0.6rem;
      color: var(--dim);
      letter-spacing: 0.08em;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <a href="/locus/" class="logo">A<span>.</span>M<span>.</span></a>
      <nav>
        <a href="/locus/">Writing</a>
        <a href="/locus/about">About</a>
      </nav>
    </header>
    <div class="content">
      {{ content }}
    </div>
    <footer>
      <span>A.M.</span>
      <span>© {{ site.time | date: "%Y" }}</span>
    </footer>
  </div>
</body>
</html>
